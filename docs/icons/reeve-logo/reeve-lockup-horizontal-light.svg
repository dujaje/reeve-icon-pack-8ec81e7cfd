<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60" role="img" aria-label="Reeve horizontal lockup">
  <title>Reeve — horizontal lockup (light)</title>
  <desc>Mark scaled 0.45 so its visible envelope (terracotta-top to bottom row, 70.5u native) sits just within the R cap-to-baseline height in Lora 50/500. Production distribution should outline text to paths.</desc>
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@500&amp;display=swap');</style>
  <!-- mark: scale 0.45, translate so visible content vertically centres within R height -->
  <g transform="translate(0 15) scale(0.45)">
    <g stroke="#121214" stroke-width="1.4" stroke-linecap="round" fill="none">
      <line x1="20" y1="20" x2="50" y2="20"/>
      <line x1="50" y1="20" x2="80" y2="20"/>
      <line x1="20" y1="50" x2="50" y2="50"/>
      <line x1="50" y1="50" x2="80" y2="50"/>
      <line x1="20" y1="80" x2="50" y2="80"/>
      <line x1="50" y1="80" x2="80" y2="80"/>
      <line x1="20" y1="20" x2="20" y2="50"/>
      <line x1="20" y1="50" x2="20" y2="80"/>
      <line x1="80" y1="20" x2="80" y2="50"/>
      <line x1="80" y1="50" x2="80" y2="80"/>
      <line x1="50" y1="50" x2="50" y2="80"/>
    </g>
    <g fill="#121214">
      <circle cx="20" cy="20" r="4"/>
      <circle cx="80" cy="20" r="4"/>
      <circle cx="20" cy="50" r="4"/>
      <circle cx="50" cy="50" r="4"/>
      <circle cx="80" cy="50" r="4"/>
      <circle cx="20" cy="80" r="4"/>
      <circle cx="50" cy="80" r="4"/>
      <circle cx="80" cy="80" r="4"/>
    </g>
    <circle cx="50" cy="20" r="6.5" fill="#C8553D"/>
  </g>
  <text x="48" y="54" font-family="Lora, Georgia, 'Times New Roman', serif" font-weight="500" font-size="50" letter-spacing="-1.1" fill="#121214">Reeve</text>
</svg>
