<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32" role="img" aria-label="Reeve mark (small / favicon)">
  <title>Reeve — favicon variant</title>
  <desc>Thickened proportions for use below 32px: stroke 2.6, node radius 5.5, highlight radius 9.</desc>
  <g stroke="#121214" stroke-width="2.6" stroke-linecap="round" fill="none">
    <line x1="20" y1="20" x2="50" y2="20"/>
    <line x1="50" y1="20" x2="80" y2="20"/>
    <line x1="20" y1="50" x2="50" y2="50"/>
    <line x1="50" y1="50" x2="80" y2="50"/>
    <line x1="20" y1="80" x2="50" y2="80"/>
    <line x1="50" y1="80" x2="80" y2="80"/>
    <line x1="20" y1="20" x2="20" y2="50"/>
    <line x1="20" y1="50" x2="20" y2="80"/>
    <line x1="80" y1="20" x2="80" y2="50"/>
    <line x1="80" y1="50" x2="80" y2="80"/>
    <line x1="50" y1="50" x2="50" y2="80"/>
  </g>
  <g fill="#121214">
    <circle cx="20" cy="20" r="5.5"/>
    <circle cx="80" cy="20" r="5.5"/>
    <circle cx="20" cy="50" r="5.5"/>
    <circle cx="50" cy="50" r="5.5"/>
    <circle cx="80" cy="50" r="5.5"/>
    <circle cx="20" cy="80" r="5.5"/>
    <circle cx="50" cy="80" r="5.5"/>
    <circle cx="80" cy="80" r="5.5"/>
  </g>
  <circle cx="50" cy="20" r="9" fill="#C8553D"/>
</svg>
